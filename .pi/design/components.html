<!-- button:start label="Button" variant=primary -->
<button class="bg-zinc-950 text-white px-4 py-2 text-sm font-medium rounded hover:bg-zinc-800 transition">
  {{label}}
</button>
<!-- button:end -->

<!-- button:start label="Button" variant=secondary -->
<button class="border border-zinc-200 text-zinc-700 px-4 py-2 text-sm font-medium rounded hover:bg-zinc-50 transition">
  {{label}}
</button>
<!-- button:end -->

<!-- input:start placeholder="Enter text..." -->
<input type="text" placeholder="{{placeholder}}" class="w-full border border-zinc-200 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-zinc-950" />
<!-- input:end -->

<!-- card:start -->
<div class="border border-zinc-200 rounded bg-white overflow-hidden">
  <div class="px-4 py-3 border-b border-zinc-200">
    <!-- slot:header -->
  </div>
  <div class="p-4">
    <!-- slot:body -->
  </div>
  <div class="px-4 py-3 border-t border-zinc-200 bg-zinc-50">
    <!-- slot:footer -->
  </div>
</div>
<!-- card:end -->

<!-- empty:start title="No items yet" description="Get started by creating your first item." -->
<div class="flex flex-col items-center justify-center py-16 text-center">
  <div class="w-12 h-12 rounded bg-zinc-100 flex items-center justify-center mb-4">
    <!-- slot:icon -->
  </div>
  <h3 class="text-base font-semibold text-zinc-900 mb-1">{{title}}</h3>
  <p class="text-sm text-zinc-600 mb-4">{{description}}</p>
  <!-- slot:action -->
</div>
<!-- empty:end -->

<!-- row:start title="John Doe" subtitle="john@example.com" meta="2h ago" -->
<div class="flex items-center justify-between px-4 py-3 border-b border-zinc-200 hover:bg-zinc-50 transition">
  <div class="flex items-center gap-3">
    <!-- slot:avatar -->
    <div>
      <p class="text-sm font-medium text-zinc-900">{{title}}</p>
      <p class="text-sm text-zinc-500">{{subtitle}}</p>
    </div>
  </div>
  <span class="text-sm text-zinc-400">{{meta}}</span>
</div>
<!-- row:end -->

<!-- badge:start label="Badge" variant=default -->
<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-zinc-100 text-zinc-700">{{label}}</span>
<!-- badge:end -->

<!-- badge:start label="Badge" variant=success -->
<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-emerald-50 text-emerald-700">{{label}}</span>
<!-- badge:end -->

<!-- badge:start label="Badge" variant=warning -->
<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-amber-50 text-amber-700">{{label}}</span>
<!-- badge:end -->

<!-- badge:start label="Badge" variant=error -->
<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-50 text-red-700">{{label}}</span>
<!-- badge:end -->

<!-- avatar:start initials="SM" size=sm -->
<div class="w-8 h-8 rounded-full bg-zinc-200 flex items-center justify-center text-xs font-medium text-zinc-600">{{initials}}</div>
<!-- avatar:end -->

<!-- avatar:start initials="MD" size=md -->
<div class="w-10 h-10 rounded-full bg-zinc-200 flex items-center justify-center text-sm font-medium text-zinc-600">{{initials}}</div>
<!-- avatar:end -->

<!-- avatar:start initials="LG" size=lg -->
<div class="w-12 h-12 rounded-full bg-zinc-200 flex items-center justify-center text-base font-medium text-zinc-600">{{initials}}</div>
<!-- avatar:end -->

<!-- field:start label="Email" placeholder="you@example.com" helper="We'll never share your email." -->
<div class="space-y-1">
  <label class="block text-sm font-medium text-zinc-900">{{label}}</label>
  <input type="text" placeholder="{{placeholder}}" class="w-full border border-zinc-200 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-zinc-950" />
  <p class="text-sm text-zinc-400">{{helper}}</p>
</div>
<!-- field:end -->

<!-- nav:start brand="My App" -->
<nav class="border-b border-zinc-200 bg-white px-6 py-3">
  <div class="flex items-center justify-between">
    <span class="text-lg font-semibold text-zinc-900">{{brand}}</span>
    <div class="flex items-center gap-4">
      <!-- slot:links -->
    </div>
  </div>
</nav>
<!-- nav:end -->
